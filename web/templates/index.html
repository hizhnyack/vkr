<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пайплайн симуляции сценариев</title>
  <link href="/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/dashboard.css" rel="stylesheet">
</head>
<body>
  <header class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
    <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3" href="/">Симуляция сценариев</a>
    <button class="navbar-toggler position-absolute d-md-none collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Меню">
      <span class="navbar-toggler-icon"></span>
    </button>
  </header>

  <div class="container-fluid">
    <div class="row">
      <nav id="sidebarMenu" class="col-md-2 col-lg-2 d-md-block bg-light sidebar collapse">
        <div class="position-sticky pt-3 d-flex flex-column sidebar-inner">
          <ul class="nav flex-column sidebar-nav-list">
            <li class="nav-item">
              <a class="nav-link active" href="#run" data-bs-target="#run" data-bs-toggle="tab">
                Запуск задачи
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#logs" data-bs-target="#logs" data-bs-toggle="tab">
                Логи
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <main class="col-md-10 ms-sm-auto col-lg-10 px-md-4">
        <div class="tab-content pt-4">
          <div class="tab-pane fade show active" id="run">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
              <h1 class="h2">Запуск задачи</h1>
            </div>

            <div class="card mb-4">
              <div class="card-header">Видео и сценарий</div>
              <div class="card-body">
                <form id="run-form" class="row g-3">
                  <div class="col-12">
                    <label for="video" class="form-label">Видеофайл</label>
                    <input type="file" class="form-control" id="video" name="video" accept=".mp4,.mkv,.mpeg,.avi" required>
                  </div>
                  <div class="col-12">
                    <label for="task" class="form-label">Промпт (описание сценария)</label>
                    <textarea class="form-control" id="task" name="task" rows="3" placeholder="Например: пешеход переходит дорогу" required></textarea>
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn btn-primary" id="submit-btn">Запустить</button>
                  </div>
                </form>

                <div id="job-status" class="mt-4 d-none">
                  <div class="border rounded p-3 bg-light">
                    <p class="mb-1"><strong>Задача:</strong> <span id="job-id" class="font-monospace small"></span></p>
                    <p class="mb-2"><strong>Статус:</strong> <span id="status-text"></span></p>
                    <div id="download-wrap" class="d-none mb-2">
                      <a id="download-link" href="#" class="btn btn-success btn-sm" download="result.mp4">Скачать результат</a>
                    </div>
                    <div id="error-wrap" class="d-none text-danger small"></div>
                    <div id="report-wrap" class="d-none mt-3 pt-3 border-top"></div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card mb-4" id="pipeline-stage-card">
              <div class="card-header">Текущий этап пайплайна</div>
              <div class="card-body py-3">
                <p id="pipeline-stage-idle" class="text-muted mb-0">Ожидание задачи</p>
                <ol id="pipeline-stage-list" class="d-none mb-0"></ol>
                <p id="pipeline-stage-unknown" class="small mb-0 d-none"></p>
              </div>
            </div>
          </div>

          <div class="tab-pane fade" id="logs">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
              <h1 class="h2">Логи сервера</h1>
              <button type="button" class="btn btn-outline-secondary btn-sm" id="refresh-logs">Обновить</button>
            </div>
            <div class="card">
              <div class="card-body p-0">
                <pre id="log-container" class="p-3 mb-0 border-0"></pre>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
