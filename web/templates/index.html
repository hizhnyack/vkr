<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пайплайн симуляции сценариев</title>
  <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
  <style>
    #log-container { height: 320px; overflow-y: scroll; overflow-x: auto; font-size: 0.875rem; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="mb-4">Симуляция дорожных сценариев</h1>

    <div class="card shadow-sm mb-4">
      <div class="card-header">Запуск задачи</div>
      <div class="card-body">
        <form id="run-form" class="row g-3">
          <div class="col-12">
            <label for="video" class="form-label">Видеофайл</label>
            <input type="file" class="form-control" id="video" name="video" accept=".mp4,.mkv,.mpeg,.avi" required>
          </div>
          <div class="col-12">
            <label for="task" class="form-label">Промпт (описание сценария)</label>
            <textarea class="form-control" id="task" name="task" rows="3" placeholder="Например: пешеход переходит дорогу" required></textarea>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary" id="submit-btn">Запустить</button>
          </div>
        </form>
        <div id="job-status" class="mt-3 d-none">
          <p class="mb-1"><strong>Задача:</strong> <span id="job-id"></span></p>
          <p class="mb-1"><strong>Статус:</strong> <span id="status-text"></span></p>
          <div id="download-wrap" class="d-none">
            <a id="download-link" href="#" class="btn btn-success btn-sm">Скачать результат</a>
          </div>
          <div id="error-wrap" class="d-none text-danger small mt-1"></div>
        <div id="report-wrap" class="d-none mt-2"></div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm mb-4" id="pipeline-stage-card">
      <div class="card-header">Текущий этап пайплайна</div>
      <div class="card-body py-2">
        <p id="pipeline-stage-idle" class="text-muted small mb-0">Ожидание задачи</p>
        <ol id="pipeline-stage-list" class="list-group list-group-numbered list-group-flush d-none mb-0"></ol>
        <p id="pipeline-stage-unknown" class="small mb-0 d-none"></p>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Логи сервера</span>
        <button type="button" class="btn btn-outline-secondary btn-sm" id="refresh-logs">Обновить</button>
      </div>
      <div class="card-body p-0">
        <pre id="log-container" class="bg-dark text-light p-3 mb-0 border-0 rounded-0"></pre>
      </div>
    </div>
  </div>

  <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
